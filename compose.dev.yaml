# Local full-stack dev environment. Boot with `make up`.
# Mirrors the production VNG Cloud topology in miniature.

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: roadpulse
      POSTGRES_PASSWORD: roadpulse
      POSTGRES_DB: roadpulse_app
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roadpulse -d roadpulse_app"]
      interval: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports: ["8123:8123", "9000:9000"]
    environment:
      CLICKHOUSE_DB: roadpulse_analytics
      CLICKHOUSE_USER: roadpulse
      CLICKHOUSE_PASSWORD: roadpulse
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    volumes:
      - clickhouse-data:/var/lib/clickhouse

  redis:
    image: redis:7.2-alpine
    ports: ["6379:6379"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  redpanda:
    image: redpandadata/redpanda:v23.3.13
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports: ["9092:9092", "9644:9644"]

  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: roadpulse
      MINIO_ROOT_PASSWORD: roadpulsepw
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - minio-data:/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.2
    command:
      - mlflow
      - server
      - --backend-store-uri=sqlite:////mlruns/mlflow.db
      - --default-artifact-root=s3://roadpulse-dev/models
      - --host=0.0.0.0
    environment:
      AWS_ACCESS_KEY_ID: roadpulse
      AWS_SECRET_ACCESS_KEY: roadpulsepw
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports: ["5500:5000"]
    depends_on: [minio]
    volumes:
      - mlflow-data:/mlruns

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports: ["16686:16686", "4317:4317", "4318:4318"]

  grafana:
    image: grafana/grafana:11.0.0
    ports: ["3000:3000"]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - grafana-data:/var/lib/grafana

  osrm-motorbike:
    image: ghcr.io/project-osrm/osrm-backend:v5.27.1
    command: ["osrm-routed", "--algorithm=mld", "/data/vietnam.osrm"]
    ports: ["5000:5000"]
    volumes:
      - ./services/osrm/data:/data:ro
    profiles: ["routing"]

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    environment:
      ROADPULSE_ENV: dev
      DATABASE_URL: postgresql+psycopg://roadpulse:roadpulse@postgres:5432/roadpulse_app
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKERS: redpanda:29092
      OTLP_ENDPOINT: http://jaeger:4318
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
      redpanda: { condition: service_started }

volumes:
  postgres-data:
  clickhouse-data:
  redis-data:
  minio-data:
  mlflow-data:
  grafana-data:
