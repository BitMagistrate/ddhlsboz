name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Каждый PR откатывает старые билды той же ветки.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (lint + tests + bench)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry==1.8.4

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('backend/poetry.lock', 'backend/pyproject.toml') }}

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install --no-interaction --no-root --with dev

      - name: Ruff lint
        run: poetry run ruff check app/ tests/

      - name: Pytest
        run: poetry run pytest -q --tb=short

      - name: Bandit (security scan)
        run: |
          poetry run pip install bandit==1.8.0
          poetry run bandit -q -r app/ -ll -ii || echo "Bandit warnings present"

      - name: Honest retrieval benchmark
        run: poetry run python -m app.benchmark | tee benchmark.json

      - name: Upload benchmark artefact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: retrieval-benchmark
          path: backend/benchmark.json
          if-no-files-found: ignore
          retention-days: 14

  frontend:
    name: frontend (lint + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Vitest (unit tests)
        run: npm test

      - name: TypeScript build
        run: npm run build

  bot:
    name: bot (lint + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: bot
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime + dev deps
        run: |
          pip install --upgrade pip
          pip install ruff==0.7.4 \
            "aiogram>=3.4,<4.0" "httpx>=0.27,<1.0" \
            pytest==8.3.3 pytest-asyncio==0.24.0 "respx>=0.22.0,<1.0"

      - name: Ruff lint
        run: |
          if [ -f pyproject.toml ] || ls *.py 2>/dev/null; then
            ruff check . || true
          else
            echo "No bot sources to lint"
          fi

      - name: Pytest
        run: pytest -q --tb=short
