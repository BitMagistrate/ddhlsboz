[project]
name = "roadpulse-core"
version = "0.1.0"
description = "Shared types, errors and geo utilities for RoadPulse."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
  "pydantic>=2.6",
  "shapely>=2.0",
]

[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["roadpulse_core"]
