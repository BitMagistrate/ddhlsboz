[project]
name = "roadpulse-privacy"
version = "0.1.0"
description = "k-anonymity guards, PII scrubbers and redactors for the RoadPulse stack."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = ["pydantic>=2.6"]

[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["roadpulse_privacy"]
