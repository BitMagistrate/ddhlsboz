[project]
name = "roadpulse-ml"
version = "0.1.0"
description = "ETA, flood-detection and eco-score models for RoadPulse."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
  "pydantic>=2.6",
  "numpy>=1.26",
  "scikit-learn>=1.4",
  "roadpulse-core>=0.1.0",
]

[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["roadpulse_ml"]
