[project]
name = "roadpulse-routing"
version = "0.1.0"
description = "Graph + Dijkstra routing engine with flood-aware edge weights."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
  "pydantic>=2.6",
  "roadpulse-core>=0.1.0",
]

[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["roadpulse_routing"]
